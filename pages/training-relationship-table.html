<!DOCTYPE html>
<html lang="en-US">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Training Relationship Table</title>
  <link rel="preload" href="../styles/style.css" as="style" />
  <link href="../styles/style.css" rel="stylesheet" />
</head>
<body>
  <header>
    <div class="container text-center">
      <h1 class="text-uppercase">Training Relationship Table</h1>
      <p><strong></strong></p>
    </div>
  </header>
  <main>
    <section>
      <div class="container">
        <div class="table-wrapper">
        <table>
        <thead>
        <tr>
        <th style="text-align: left;">Reps Range</th>
        <th style="text-align: left;">%1RM at 0 RIR</th>
        <th style="text-align: left;">Rest Time</th>
        <th style="text-align: left;">Best Use</th>
        </tr>
        </thead>
        <tbody>
        <tr>
        <td style="text-align: left;">1–4 reps</td>
        <td style="text-align: left;">100–90%</td>
        <td style="text-align: left;">6–7 min</td>
        <td style="text-align: left;">Neural Adaptation</td>
        </tr>
        <tr>
        <td style="text-align: left;">4–7 reps</td>
        <td style="text-align: left;">90–80%</td>
        <td style="text-align: left;">5–6 min</td>
        <td style="text-align: left;">Muscular Strength</td>
        </tr>
        <tr>
        <td style="text-align: left;">7–10 reps</td>
        <td style="text-align: left;">80–70%</td>
        <td style="text-align: left;">4–5 min</td>
        <td style="text-align: left;">Muscular Hypertrophy</td>
        </tr>
        <tr>
        <td style="text-align: left;">10–13 reps</td>
        <td style="text-align: left;">70–60%</td>
        <td style="text-align: left;">3–4 min</td>
        <td style="text-align: left;">Muscular Hypertrophy</td>
        </tr>
        </tbody>
        </table>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
